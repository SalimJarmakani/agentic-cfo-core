services:
  postgres:
    image: postgres:16
    container_name: cfo-postgres
    environment:
      POSTGRES_DB: ${PGDATABASE:-caixabank}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-caixabank}"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5
    container_name: cfo-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j12345}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4j12345} \"RETURN 1\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cfo-migrate
    env_file:
      - .env
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-caixabank}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j12345}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      DATA_DIR: /app/data
      SAMPLE_USERS: ${SAMPLE_USERS:-0}
      RANDOM_SEED: ${RANDOM_SEED:-42}
    command: >
      sh -c "python migration/migrate_caixabank_to_postgres.py &&
             python migration/migrate_caixabank_to_neo4j.py"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cfo-api
    env_file:
      - .env
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-caixabank}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j12345}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pg_data:
  neo4j_data:
  neo4j_logs:
